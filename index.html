<title>Queue du jour — juliapp & Torool</title>
<style>
:root{
  --bg:#0f0e13; --card:#191821; --card2:#221f2c; --line:#2e2b3a;
  --ink:#f4f1ec; --ink2:#b3aea6; --ink3:#807b73;
  --tor:#ef6aa6; --jul:#d8ab6a; --ok:#4fb477;
  --r:16px;
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
@media(prefers-color-scheme:light){:root{
  --bg:#f6f4f0; --card:#fff; --card2:#efece6; --line:#e0dbd2;
  --ink:#1b1a17; --ink2:#5b564e; --ink3:#8d877c;
  --tor:#d4276e; --jul:#a97528; --ok:#2f8f5b;}}
:root[data-theme="light"]{
  --bg:#f6f4f0; --card:#fff; --card2:#efece6; --line:#e0dbd2;
  --ink:#1b1a17; --ink2:#5b564e; --ink3:#8d877c;
  --tor:#d4276e; --jul:#a97528; --ok:#2f8f5b;}
:root[data-theme="dark"]{
  --bg:#0f0e13; --card:#191821; --card2:#221f2c; --line:#2e2b3a;
  --ink:#f4f1ec; --ink2:#b3aea6; --ink3:#807b73;
  --tor:#ef6aa6; --jul:#d8ab6a; --ok:#4fb477;}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
.wrap{max-width:760px;margin:0 auto;padding:0 14px 96px}

/* ---- en-tete collante : le filtre de marque doit rester sous le pouce ---- */
.top{position:sticky;top:0;z-index:20;background:var(--bg);
  padding:14px 0 10px;border-bottom:1px solid var(--line)}
h1{font-size:20px;margin:0;letter-spacing:-.01em;font-weight:800}
.sub{font-size:12.5px;color:var(--ink3);margin-top:3px}
.filtres{display:flex;gap:8px;margin-top:12px}
.filtres button{flex:1;appearance:none;border:1px solid var(--line);background:var(--card);
  color:var(--ink2);font:inherit;font-size:14px;font-weight:700;padding:11px 8px;
  border-radius:12px;cursor:pointer;min-height:46px}
.filtres button.on{color:#12111a;border-color:transparent}
.filtres button[data-m="juliapp"].on{background:var(--jul)}
.filtres button[data-m="torool"].on{background:var(--tor)}
.filtres button[data-m="tous"].on{background:var(--ink);color:var(--bg)}
.compte{font-family:var(--mono);font-size:12px;color:var(--ink3);margin-top:9px;
  display:flex;justify-content:space-between}
.compte a{color:var(--ink3);cursor:pointer;text-decoration:underline}

/* ---- carte ---- */
.liste{display:grid;gap:12px;margin-top:14px}
@media(min-width:640px){.liste{grid-template-columns:1fr 1fr}}
.c{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:12px;display:flex;gap:12px;align-items:flex-start}
.c.fait{opacity:.42}
.c img{width:78px;height:139px;object-fit:cover;border-radius:10px;flex:none;background:var(--card2)}
.corps{min-width:0;flex:1}
.meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.b{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
  padding:3px 7px;border-radius:6px}
.b.jul{color:#12111a;background:var(--jul)} .b.tor{color:#12111a;background:var(--tor)}
.f{font-size:11px;color:var(--ink3);font-family:var(--mono)}
.leg{font-size:14px;line-height:1.4;margin-top:7px;color:var(--ink)}
.tags{font-size:11.5px;color:var(--ink3);font-family:var(--mono);margin-top:5px;
  word-break:break-word}
.actions{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.actions a,.actions button{appearance:none;border:1px solid var(--line);background:var(--card2);
  color:var(--ink);font:inherit;font-size:13px;font-weight:700;padding:0 12px;height:42px;
  display:inline-flex;align-items:center;gap:6px;border-radius:11px;cursor:pointer;
  text-decoration:none;white-space:nowrap}
.actions a.dl{background:var(--ink);color:var(--bg);border-color:transparent}
.actions button.done.on{background:var(--ok);color:#0d1512;border-color:transparent}
.vide{text-align:center;color:var(--ink3);padding:48px 0;font-size:14px}
/* toast de confirmation de copie */
#t{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
  background:var(--ok);color:#0d1512;font-weight:800;font-size:14px;padding:12px 20px;
  border-radius:999px;opacity:0;pointer-events:none;transition:.18s;z-index:50}
#t.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<div class="wrap">
  <div class="top">
    <h1>Queue du jour</h1>
    <div class="sub">Choisis, télécharge, copie, poste. L'ordre n'a pas d'importance.</div>
    <div class="filtres">
      <button data-m="tous" class="on">Tout <span class="f">41</span></button>
      <button data-m="juliapp">juliapp <span class="f">21</span></button>
      <button data-m="torool">Torool <span class="f">20</span></button>
    </div>
    <div class="compte"><span id="reste"></span><a id="raz">tout décocher</a></div>
  </div>
  <div class="liste" id="l"></div>
  <div class="vide" id="v" hidden>Tout est marqué comme fait pour ce filtre.</div>
</div>
<div id="t"></div>

const CLE = "ce-queue-faits-v1";
let faits = new Set(JSON.parse(localStorage.getItem(CLE) || "[]"));
let filtre = "tous";

const sauver = () => localStorage.setItem(CLE, JSON.stringify([...faits]));
const toast = (m) => { const t = document.getElementById("t"); t.textContent = m;
  t.classList.add("on"); clearTimeout(t._x); t._x = setTimeout(() => t.classList.remove("on"), 1400); };

function copier(txt){
  // navigator.clipboard demande un contexte sûr ; le repli textarea couvre le reste,
  // parce qu'une copie qui échoue silencieusement lui ferait poster sans légende.
  if (navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(txt).then(() => toast("Légende copiée"),
      () => toast("Copie refusée — sélectionne à la main"));
  } else {
    const a = document.createElement("textarea");
    a.value = txt; a.style.position = "fixed"; a.style.opacity = "0";
    document.body.appendChild(a); a.select();
    try { document.execCommand("copy"); toast("Légende copiée"); }
    catch(e){ toast("Copie refusée — sélectionne à la main"); }
    document.body.removeChild(a);
  }
}

function rendre(){
  const l = document.getElementById("l");
  const vus = P.filter(p => filtre === "tous" || p.marque === filtre);
  l.innerHTML = "";
  vus.forEach(p => {
    const fait = faits.has(p.id);
    const c = document.createElement("div");
    c.className = "c" + (fait ? " fait" : "");
    const texte = p.legende + "\n\n" + p.hashtags;
    const img = p.vignette
      ? `<img src="data:image/jpeg;base64,${p.vignette}" alt="" loading="lazy">`
      : `<div class="img"></div>`;
    c.innerHTML = `${img}<div class="corps">
      <div class="meta"><span class="b ${p.marque === "juliapp" ? "jul" : "tor"}">${p.marque}</span>
        <span class="f">${p.format}</span></div>
      <div class="leg"></div><div class="tags"></div>
      <div class="actions">
        <a class="dl" href="${p.url}" download>Télécharger</a>
        <button class="cp">Copier</button>
        <button class="done ${fait ? "on" : ""}">${fait ? "Fait" : "À faire"}</button>
      </div></div>`;
    c.querySelector(".leg").textContent = p.legende;
    c.querySelector(".tags").textContent = p.hashtags;
    c.querySelector(".cp").onclick = () => copier(texte);
    c.querySelector(".done").onclick = () => {
      faits.has(p.id) ? faits.delete(p.id) : faits.add(p.id);
      sauver(); rendre();
    };
    l.appendChild(c);
  });
  const restants = vus.filter(p => !faits.has(p.id)).length;
  document.getElementById("reste").textContent = `${restants} à poster / ${vus.length}`;
  document.getElementById("v").hidden = !(vus.length && restants === 0) ;
}

document.querySelectorAll(".filtres button").forEach(b => b.onclick = () => {
  document.querySelectorAll(".filtres button").forEach(x => x.classList.remove("on"));
  b.classList.add("on"); filtre = b.dataset.m; rendre();
});
document.getElementById("raz").onclick = () => { faits = new Set(); sauver(); rendre(); };
rendre();
</script>
